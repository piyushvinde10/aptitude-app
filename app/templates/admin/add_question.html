{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">➕ Add New Question</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Question</label>
                        <textarea name="question_text" class="form-control"
                            rows="3" placeholder="Enter your question here..." required></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Option A</label>
                        <input type="text" name="option_a" class="form-control"
                            placeholder="Option A" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Option B</label>
                        <input type="text" name="option_b" class="form-control"
                            placeholder="Option B" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Option C</label>
                        <input type="text" name="option_c" class="form-control"
                            placeholder="Option C" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Option D</label>
                        <input type="text" name="option_d" class="form-control"
                            placeholder="Option D" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">Correct Answer</label>
                        <select name="correct_option" class="form-select" required>
                            <option value="">-- Select Correct Option --</option>
                            <option value="a">A</option>
                            <option value="b">B</option>
                            <option value="c">C</option>
                            <option value="d">D</option>
                        </select>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary px-4">
                            Save Question ✅
                        </button>
                        <a href="{{ url_for('admin.dashboard') }}"
                            class="btn btn-outline-secondary">
                            Cancel
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
